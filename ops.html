<!DOCTYPE html>
<!--
  RestWerks Ops Dash
  Version: 0.1.1 — 2026-06-14_2027 CT
  Internal RestWerks operator god view (read-only). restwerks.com/ops, NOT linked from the site.
  Pairs with portal v1.35.0 (/api/ops/* + requireSuperadmin). Disposable down-and-dirty slice 1.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>RestWerks Ops</title>
<style>
  :root {
    --bg:#0b0f14; --panel:#141a22; --panel2:#1b232d; --line:#27313d;
    --text:#e6edf3; --dim:#8a97a6; --green:#1D9E75; --amber:#d98a2b;
    --red:#cc4400; --blue:#2D7DD2;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  header { display:flex; align-items:center; gap:14px; padding:12px 18px;
    border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:5; }
  header h1 { font-size:15px; margin:0; font-weight:700; letter-spacing:.3px; }
  header h1 span { color:var(--green); }
  header .meta { color:var(--dim); font-size:12px; }
  header .right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  button { background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:7px 12px; font-size:13px; cursor:pointer; }
  button:hover { border-color:var(--green); }
  .wrap { padding:18px; max-width:1400px; margin:0 auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--dim); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:var(--panel); }
  td.name { font-weight:600; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { display:inline-block; padding:2px 7px; border-radius:5px; font-size:11px; font-weight:600; }
  .pill.live { background:rgba(29,158,117,.15); color:var(--green); }
  .pill.preview, .pill.other { background:rgba(217,138,43,.15); color:var(--amber); }
  .pill.test { background:rgba(45,125,210,.15); color:var(--blue); }
  .hot { color:var(--amber); font-weight:700; }
  .zero { color:var(--dim); }
  .stale { color:var(--red); }
  .login { max-width:340px; margin:80px auto; background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:24px; }
  .login h2 { margin:0 0 4px; font-size:16px; }
  .login p { color:var(--dim); margin:0 0 18px; font-size:13px; }
  .login input { width:100%; padding:10px; margin-bottom:10px; background:var(--bg);
    border:1px solid var(--line); border-radius:6px; color:var(--text); font-size:14px; }
  .login button { width:100%; background:var(--green); border-color:var(--green); color:#fff; font-weight:600; padding:10px; }
  .err { color:var(--red); font-size:13px; margin-top:8px; min-height:16px; }
  /* drill-down */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:10; display:none; }
  .overlay.open { display:block; }
  .drawer { position:fixed; top:0; right:0; bottom:0; width:min(720px,94vw); background:var(--bg);
    border-left:1px solid var(--line); z-index:11; transform:translateX(100%);
    transition:transform .18s ease; overflow-y:auto; }
  .drawer.open { transform:translateX(0); }
  .drawer-head { display:flex; align-items:center; gap:10px; padding:14px 18px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); }
  .drawer-head h2 { margin:0; font-size:16px; }
  .drawer-head button { margin-left:auto; }
  .section { padding:14px 18px; border-bottom:1px solid var(--line); }
  .section h3 { margin:0 0 10px; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--green); }
  .row2 { display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px solid var(--panel2); }
  .row2:last-child { border-bottom:none; }
  .row2 .l { color:var(--text); }
  .row2 .r { color:var(--dim); text-align:right; font-size:12px; }
  .msg { padding:7px 0; border-bottom:1px solid var(--panel2); font-size:13px; }
  .msg:last-child { border-bottom:none; }
  .msg .who { font-size:11px; color:var(--dim); margin-bottom:2px; }
  .msg .who b.user { color:var(--blue); } .msg .who b.andi { color:var(--green); } .msg .who b.human { color:var(--amber); }
  .msg .body { color:var(--text); white-space:pre-wrap; word-break:break-word; }
  .empty { color:var(--dim); font-style:italic; font-size:13px; }
  .loading { color:var(--dim); padding:40px; text-align:center; }
</style>
</head>
<body>

<div id="login" class="login" style="display:none">
  <h2>RestWerks <span style="color:var(--green)">Ops</span></h2>
  <p>Operator sign in.</p>
  <input id="email" type="email" placeholder="email" autocomplete="username">
  <input id="pw" type="password" placeholder="password" autocomplete="current-password">
  <button id="loginBtn">Sign in</button>
  <div id="loginErr" class="err"></div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>RestWerks <span>Ops</span></h1>
    <div class="meta" id="genMeta"></div>
    <div class="right">
      <button id="refreshBtn">Refresh</button>
      <button id="logoutBtn">Sign out</button>
    </div>
  </header>
  <div class="wrap">
    <div id="tableWrap"><div class="loading">Loading…</div></div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="drawer" class="drawer">
  <div class="drawer-head">
    <h2 id="drawerTitle">Integrator</h2>
    <button id="closeDrawer">Close</button>
  </div>
  <div id="drawerBody"><div class="loading">Loading…</div></div>
</div>

<script>
const PORTAL_URL = 'https://restwerks-portal-production.up.railway.app';
const $ = id => document.getElementById(id);

function token() { return localStorage.getItem('rw-token'); }

async function api(path) {
  let res;
  try {
    res = await fetch(PORTAL_URL + path, {
      headers: { 'Authorization': 'Bearer ' + token() },
      credentials: 'include'
    });
  } catch (netErr) {
    throw new Error('Network error reaching the portal (' + netErr.message + ').');
  }
  if (res.status === 401) { localStorage.removeItem('rw-token'); showLogin('Session expired, sign in again.'); throw new Error('unauth'); }
  if (res.status === 403) { showLogin('Signed in, but this account is not a RestWerks operator. Check SUPERADMIN_EMAILS matches your login email exactly, then redeploy the portal.'); throw new Error('forbidden'); }
  if (!res.ok) {
    let body = '';
    try { body = (await res.json()).detail || (await res.text()); } catch (e) { try { body = await res.text(); } catch (e2) {} }
    throw new Error('Portal returned ' + res.status + (body ? ': ' + body : ''));
  }
  return res.json();
}

function showLogin(msg) {
  $('app').style.display = 'none';
  $('login').style.display = 'block';
  $('loginErr').textContent = msg || '';
}
function showApp() {
  $('login').style.display = 'none';
  $('app').style.display = 'block';
}

async function doLogin() {
  $('loginErr').textContent = '';
  const email = $('email').value.trim();
  const pw = $('pw').value;
  if (!email || !pw) { $('loginErr').textContent = 'Email and password required.'; return; }
  try {
    const res = await fetch(PORTAL_URL + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) { $('loginErr').textContent = data.error || 'Sign in failed.'; return; }
    if (data.auth_token) localStorage.setItem('rw-token', data.auth_token);
    showApp();
    load();
  } catch (e) {
    $('loginErr').textContent = 'Network error.';
  }
}

// ── time helpers ──
function ago(ts) {
  if (!ts) return '—';
  const d = new Date(ts), now = Date.now();
  const s = Math.floor((now - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  const days = Math.floor(s/86400);
  if (days < 30) return days + 'd ago';
  return d.toLocaleDateString();
}
function dateOnly(ts) { return ts ? new Date(ts).toLocaleDateString() : '—'; }
function staleClass(ts) {
  if (!ts) return 'stale';
  const days = (Date.now() - new Date(ts).getTime()) / 86400000;
  return days > 7 ? 'stale' : '';
}
function n(v) { return v == null ? 0 : Number(v); }
function numCell(v, hotIf) {
  const val = n(v);
  let cls = val === 0 ? 'zero' : '';
  if (hotIf && val >= hotIf) cls = 'hot';
  return '<td class="num ' + cls + '">' + val + '</td>';
}
function statusPill(s, isTest) {
  if (isTest) return '<span class="pill test">test</span>';
  const k = s === 'live' ? 'live' : (s === 'preview' ? 'preview' : 'other');
  return '<span class="pill ' + k + '">' + (s || 'unknown') + '</span>';
}

// ── overview ──
async function load() {
  $('tableWrap').innerHTML = '<div class="loading">Loading…</div>';
  let data;
  try { data = await api('/api/ops/overview'); }
  catch (e) {
    if (e.message === 'unauth' || e.message === 'forbidden') return;
    $('tableWrap').innerHTML = '<div class="section empty" style="color:var(--red)">' + esc(e.message) + '</div>';
    return;
  }
  $('genMeta').textContent = data.integrators.length + ' integrators · ' + new Date(data.generated_at).toLocaleTimeString();
  if (!data.integrators.length) { $('tableWrap').innerHTML = '<div class="empty">No integrators.</div>'; return; }
  let h = '<table><thead><tr>' +
    '<th>Integrator</th><th>Status</th><th>Number</th>' +
    '<th class="num">Members</th><th class="num">Homes</th><th class="num">Threads</th>' +
    '<th class="num">Client 7d</th><th class="num">Andi 7d</th>' +
    '<th class="num">Open tix</th><th class="num">Follow ups</th><th class="num">Flags</th>' +
    '<th>Last message</th><th>Last login</th></tr></thead><tbody>';
  for (const i of data.integrators) {
    h += '<tr onclick="openDrawer(\'' + i.id + '\',\'' + (i.name||'').replace(/'/g,"\\'") + '\')">' +
      '<td class="name">' + esc(i.name || '(unnamed)') + '</td>' +
      '<td>' + statusPill(i.status, i.is_test) + '</td>' +
      '<td class="' + (i.telnyx_number ? '' : 'zero') + '">' + (i.telnyx_number || '—') + '</td>' +
      numCell(i.members) +
      numCell(i.households) +
      numCell(i.threads) +
      numCell(i.client_msgs_7d) +
      numCell(i.andi_msgs_7d) +
      numCell(i.open_tickets, 1) +
      numCell(i.pending_followups, 1) +
      numCell(i.open_flags, 1) +
      '<td class="' + staleClass(i.last_message_at) + '">' + ago(i.last_message_at) + '</td>' +
      '<td class="' + staleClass(i.last_login_at) + '">' + ago(i.last_login_at) + '</td>' +
      '</tr>';
  }
  h += '</tbody></table>';
  $('tableWrap').innerHTML = h;
}

// ── drill-down ──
async function openDrawer(id, name) {
  $('drawerTitle').textContent = name || 'Integrator';
  $('drawerBody').innerHTML = '<div class="loading">Loading…</div>';
  $('overlay').classList.add('open');
  $('drawer').classList.add('open');
  let d;
  try { d = await api('/api/ops/integrator/' + id); } catch (e) { $('drawerBody').innerHTML = '<div class="section empty">Failed to load.</div>'; return; }

  let h = '';
  // info
  h += '<div class="section">' +
    '<div class="row2"><span class="l">Status</span><span class="r">' + statusPill(d.integrator.status, d.integrator.is_test) + '</span></div>' +
    '<div class="row2"><span class="l">Number</span><span class="r">' + (d.integrator.telnyx_number || '—') + '</span></div>' +
    '<div class="row2"><span class="l">Timezone</span><span class="r">' + (d.integrator.timezone || '—') + '</span></div>' +
    '<div class="row2"><span class="l">Created</span><span class="r">' + dateOnly(d.integrator.created_at) + '</span></div>' +
    '</div>';

  // members
  h += '<div class="section"><h3>Team (' + d.members.length + ')</h3>';
  if (!d.members.length) h += '<div class="empty">No members.</div>';
  for (const m of d.members) {
    const nm = ((m.first_name||'') + ' ' + (m.last_name||'')).trim() || m.email;
    const role = m.role + (m.active ? '' : ' · removed');
    h += '<div class="row2"><span class="l">' + esc(nm) + ' <span style="color:var(--dim);font-size:12px">' + esc(role) + '</span></span>' +
      '<span class="r ' + staleClass(m.last_login) + '">' + (m.last_login ? ago(m.last_login) : 'never') + '</span></div>';
  }
  h += '</div>';

  // open flags
  h += '<div class="section"><h3>Open flags (' + d.open_flags.length + ')</h3>';
  if (!d.open_flags.length) h += '<div class="empty">None.</div>';
  for (const f of d.open_flags) {
    h += '<div class="row2"><span class="l">' + esc(f.note || '(no note)') + '</span>' +
      '<span class="r">' + esc(f.flagged_by||'') + ' · ' + ago(f.created_at) + '</span></div>';
  }
  h += '</div>';

  // open tickets
  h += '<div class="section"><h3>Open tickets (' + d.open_tickets.length + ')</h3>';
  if (!d.open_tickets.length) h += '<div class="empty">None.</div>';
  for (const t of d.open_tickets) {
    h += '<div class="row2"><span class="l">' + esc(t.ticket_type || 'Ticket #' + t.id) + '</span>' +
      '<span class="r">' + (t.phone_number||'') + ' · ' + ago(t.created_at) + '</span></div>';
  }
  h += '</div>';

  // recent messages
  h += '<div class="section"><h3>Recent activity (' + d.messages.length + ')</h3>';
  if (!d.messages.length) h += '<div class="empty">No messages.</div>';
  for (const m of d.messages) {
    const who = m.role === 'user' ? '<b class="user">Client</b>' : (m.role === 'human' ? '<b class="human">Team</b>' : '<b class="andi">Andi</b>');
    h += '<div class="msg"><div class="who">' + who + ' · ' + (m.phone_number||'') + ' · ' + ago(m.created_at) + '</div>' +
      '<div class="body">' + esc((m.message||'').slice(0,400)) + '</div></div>';
  }
  h += '</div>';

  $('drawerBody').innerHTML = h;
}
function closeDrawer() {
  $('overlay').classList.remove('open');
  $('drawer').classList.remove('open');
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── wire up ──
$('loginBtn').onclick = doLogin;
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('refreshBtn').onclick = load;
$('logoutBtn').onclick = () => { localStorage.removeItem('rw-token'); closeDrawer(); showLogin(); };
$('closeDrawer').onclick = closeDrawer;
$('overlay').onclick = closeDrawer;

// boot: if a token is already in this browser (e.g. signed into the dashboard), try straight in
if (token()) { showApp(); load().catch(()=>{}); }
else showLogin();
</script>
</body>
</html>
